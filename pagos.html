    <script>
        // VARIABLES GLOBALES PARA MANEJAR DATOS Y FILTROS
        let pagosCargadosDesdeBackend = []; 
        let pagosActualesExportar = [];     
        let buscadorJugadores = null; 

        // 1. SEGURIDAD BLINDADA (ROLES)
        if (!sessionStorage.getItem('usuarioLogueado')) {
            window.location.href = 'login.html';
        }

        const rolUsuario = sessionStorage.getItem('usuarioRol');
        if (rolUsuario === 'Cuerpo Tecnico') {
            alert('⛔ Acceso Denegado: La sección de Tesorería es exclusiva para el personal administrativo.');
            window.location.href = 'index.html';
        }

        document.getElementById('p-fecha').valueAsDate = new Date();

        // 2. CARGAR JUGADORES BLINDADO
        async function cargarJugadoresSelect() {
            try {
                const respuesta = await fetch('/jugadores');
                const jugadores = await respuesta.json();
                
                jugadores.sort((a, b) => a.apellido.localeCompare(b.apellido));

                const select = document.getElementById('p-jugador');

                buscadorJugadores = new Choices(select, {
                    searchEnabled: true,
                    searchPlaceholderValue: '🔍 Buscar apellido...',
                    itemSelectText: 'Seleccionar',
                    noResultsText: 'No se encontraron jugadores',
                    shouldSort: false,
                    searchFields: ['label'],
                    fuseOptions: { threshold: 0.2, ignoreLocation: true }
                });

                const opciones = [
                    { value: '', label: 'Todos los jugadores (Ver historial global)', selected: true },
                    ...jugadores.map(j => ({
                        value: String(j.id), 
                        label: `${j.apellido}, ${j.nombre} - ${j.rama || 'Masc'}`
                    }))
                ];

                buscadorJugadores.setChoices(opciones, 'value', 'label', true);
                select.addEventListener('change', cargarHistorial);

            } catch (error) {
                console.error('Error al cargar jugadores:', error);
            }
        }

        // 3. CARGAR HISTORIAL (BÚSQUEDA A BASE DE DATOS)
        async function cargarHistorial() {
            const jugador_id = document.getElementById('p-jugador').value;
            const tabla = document.getElementById('tabla-historial');
            
            // Eliminamos cualquier botón de notificación previo para limpiar la vista
            const btnPrevio = document.getElementById('contenedor-boton-notificar');
            if (btnPrevio) btnPrevio.remove();

            tabla.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-success"></div></td></tr>';

            try {
                const urlFetch = jugador_id ? `/pagos/${jugador_id}` : '/pagos-todos';
                
                const respuesta = await fetch(urlFetch);
                pagosCargadosDesdeBackend = await respuesta.json();

                document.getElementById('filtro-mes').value = "";
                renderizarTabla();

            } catch (error) {
                console.error('Error historial:', error);
                tabla.innerHTML = '<tr><td colspan="6" class="text-center text-danger py-4">Error de conexión.</td></tr>';
            }
        }

        // ====================================================================
        // RENDERIZAR TABLA CON FILTROS Y ACTUALIZAR TARJETAS EN TIEMPO REAL
        // ====================================================================
        function renderizarTabla() {
            const jugador_id = document.getElementById('p-jugador').value;
            const tabla = document.getElementById('tabla-historial');
            const mesFiltro = document.getElementById('filtro-mes').value;

            let pagosFiltrados = pagosCargadosDesdeBackend;
            if (mesFiltro !== "") {
                pagosFiltrados = pagosCargadosDesdeBackend.filter(pago => pago.mes_correspondiente === mesFiltro);
            }
            pagosActualesExportar = pagosFiltrados;

            const cantidadTotal = pagosFiltrados.length;
            const montoTotal = pagosFiltrados.reduce((suma, pago) => suma + Number(pago.monto), 0);

            document.getElementById('stat-cuotas').innerText = cantidadTotal;
            document.getElementById('stat-recaudacion').innerText = `$ ${montoTotal.toLocaleString('es-AR')}`;

            if (jugador_id !== "" || mesFiltro !== "") {
                document.getElementById('titulo-cuotas').innerText = 'Cuotas (Filtradas)';
                document.getElementById('titulo-recaudacion').innerText = 'Recaudación (Filtrada)';
            } else {
                document.getElementById('titulo-cuotas').innerText = 'Total Cuotas Cobradas';
                document.getElementById('titulo-recaudacion').innerText = 'Recaudación Global';
            }

            if (pagosFiltrados.length === 0) {
                tabla.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4 fw-bold">No hay pagos que coincidan con este filtro.</td></tr>';
                return;
            }

            tabla.innerHTML = '';
            pagosFiltrados.forEach(pago => {
                const fechaObj = new Date(pago.fecha_pago);
                fechaObj.setMinutes(fechaObj.getMinutes() + fechaObj.getTimezoneOffset());
                const fechaFormat = fechaObj.toLocaleDateString('es-AR');
                const montoFormat = `$${Number(pago.monto).toLocaleString('es-AR')}`;

                let nombreMostrar = '';
                if (pago.apellido && pago.nombre) {
                    nombreMostrar = `${pago.apellido}, ${pago.nombre}`; 
                } else if (jugador_id) {
                    const selectJugador = document.getElementById('p-jugador');
                    nombreMostrar = selectJugador.options[selectJugador.selectedIndex].text.split(' - ')[0];
                }

                const fila = `
                    <tr>
                        <td class="ps-3 fw-bold text-dark small">${nombreMostrar}</td>
                        <td class="fw-bold text-primary">${pago.mes_correspondiente}</td>
                        <td class="text-muted small">${fechaFormat}</td>
                        <td class="fw-bold text-success">${montoFormat}</td>
                        <td><span class="badge bg-secondary">${pago.metodo}</span></td>
                        <td class="text-center"> <div class="btn-group shadow-sm">
                                <button type="button" class="btn btn-outline-dark btn-sm" title="Imprimir Papel" 
                                    onclick="imprimirReciboPapel('${pago.mes_correspondiente}', '${fechaFormat}', '${montoFormat}', '${pago.metodo}', '${nombreMostrar}')">
                                    <i class="bi bi-printer-fill"></i>
                                </button>
                                <button type="button" class="btn btn-outline-success btn-sm" title="Enviar WhatsApp" 
                                    onclick="generarYEnviarRecibo('${pago.mes_correspondiente}', '${fechaFormat}', '${montoFormat}', '${pago.metodo}', '${nombreMostrar}')">
                                    <i class="bi bi-whatsapp"></i>
                                </button>
                                <button type="button" class="btn btn-outline-primary btn-sm" title="Editar Pago" 
                                    onclick="abrirModalEditar(${pago.id}, '${pago.mes_correspondiente}', '${pago.fecha_pago}', ${pago.monto}, '${pago.metodo}', '${pago.observaciones || ''}')">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button type="button" class="btn btn-outline-danger btn-sm" title="Anular Pago" 
                                    onclick="eliminarPago(${pago.id})">
                                    <i class="bi bi-trash3"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
                tabla.innerHTML += fila;
            });
        }

        // ====================================================================
        // EXPORTAR A EXCEL (XLSX)
        // ====================================================================
        function exportarAExcel() {
            if (pagosActualesExportar.length === 0) {
                alert("⚠️ No hay datos en la tabla para exportar.");
                return;
            }

            const jugador_id = document.getElementById('p-jugador').value;
            let nombreFijo = "";
            if (jugador_id) {
                const selectJugador = document.getElementById('p-jugador');
                nombreFijo = selectJugador.options[selectJugador.selectedIndex].text.split(' - ')[0];
            }

            const datosExcel = pagosActualesExportar.map(pago => {
                let nombreMostrar = '';
                if (pago.apellido && pago.nombre) {
                    nombreMostrar = `${pago.apellido}, ${pago.nombre}`; 
                } else {
                    nombreMostrar = nombreFijo;
                }

                const fechaObj = new Date(pago.fecha_pago);
                fechaObj.setMinutes(fechaObj.getMinutes() + fechaObj.getTimezoneOffset());
                const fechaFormat = fechaObj.toLocaleDateString('es-AR');

                return {
                    "Jugador": nombreMostrar,
                    "Mes": pago.mes_correspondiente,
                    "Fecha": fechaFormat,
                    "Monto ($)": Number(pago.monto), 
                    "Método": pago.metodo,
                    "Observaciones": pago.observaciones || ""
                };
            });

            const worksheet = XLSX.utils.json_to_sheet(datosExcel);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Libro Mayor");

            let nombreArchivo = "Historial_Pagos_SolDeMayo";
            if (nombreFijo) {
                nombreArchivo += `_${nombreFijo.replace(/ /g, '_')}`; 
            }
            nombreArchivo += ".xlsx"; 

            XLSX.writeFile(workbook, nombreArchivo);
        }

        // 5. GUARDAR PAGO
        document.getElementById('form-pago').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const jugadorId = document.getElementById('p-jugador').value;
            if(!jugadorId) {
                alert('⚠️ Por favor, seleccioná a un jugador de la lista antes de guardar el pago.');
                return;
            }

            const montoIngresado = parseFloat(document.getElementById('p-monto').value);
            if(isNaN(montoIngresado) || montoIngresado <= 0) {
                alert('⚠️ El monto a cobrar debe ser mayor a $0.');
                return;
            }

            const mesSeleccionado = document.getElementById('p-mes').value;

            try {
                const resCheck = await fetch(`/pagos/${jugadorId}`);
                const pagosDelJugador = await resCheck.json();

                const yaTienePago = pagosDelJugador.some(pago => pago.mes_correspondiente === mesSeleccionado);

                if (yaTienePago) {
                    const quiereForzar = confirm(`⚠️ ATENCIÓN: Este jugador ya tiene un cobro registrado para la cuota de ${mesSeleccionado}.\n\n¿Estás seguro de que querés registrar OTRO pago para este mismo mes? (Aceptar solo si es para saldar una deuda o pago parcial).`);
                    
                    if (!quiereForzar) {
                        return; 
                    }
                }
            } catch (error) {
                console.error('Error al verificar pagos duplicados:', error);
            }

            const nuevoPago = {
                jugador_id: jugadorId,
                mes_correspondiente: mesSeleccionado,
                fecha_pago: document.getElementById('p-fecha').value,
                monto: document.getElementById('p-monto').value,
                metodo: document.getElementById('p-metodo').value,
                observaciones: document.getElementById('p-observaciones').value
            };

            try {
                const respuesta = await fetch('/pagos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(nuevoPago)
                });

                if (respuesta.ok) {
                    alert(`✅ ¡Pago registrado con éxito!`);
                    document.getElementById('p-monto').value = '';
                    document.getElementById('p-observaciones').value = '';
                    cargarHistorial(); 
                } else {
                    alert('❌ Ocurrió un error al guardar el pago en la base de datos.');
                }
            } catch (error) {
                console.error('Error de conexión:', error);
                alert('❌ No se pudo conectar con el servidor.');
            }
        });

        // 6A. NUEVO FLUJO: EMERGENTE PARA GUARDAR PDF Y LUEGO WHATSAPP
        function generarYEnviarRecibo(mes, fecha, monto, metodo, nombreJugador) {

        // 7. ABRIR MODAL Y CARGAR DATOS PARA EDITAR
        function abrirModalEditar(id, mes, fechaIso, monto, metodo, observaciones) {
            document.getElementById('edit-pago-id').value = id;
            document.getElementById('edit-mes').value = mes;
            const fechaOk = new Date(fechaIso).toISOString().split('T')[0];
            document.getElementById('edit-fecha').value = fechaOk;
            document.getElementById('edit-monto').value = monto;
            document.getElementById('edit-metodo').value = metodo;
            document.getElementById('edit-observaciones').value = observaciones;
            const modal = new bootstrap.Modal(document.getElementById('modalEditarPago'));
            modal.show();
        }

        // 8. ENVIAR CAMBIOS AL SERVIDOR
        document.getElementById('form-editar-pago').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-pago-id').value;
            const pagoActualizado = {
                mes_correspondiente: document.getElementById('edit-mes').value,
                fecha_pago: document.getElementById('edit-fecha').value,
                monto: document.getElementById('edit-monto').value,
                metodo: document.getElementById('edit-metodo').value,
                observaciones: document.getElementById('edit-observaciones').value
            };
            try {
                const respuesta = await fetch(`/pagos/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pagoActualizado)
                });
                if (respuesta.ok) {
                    alert('✅ Pago actualizado correctamente.');
                    bootstrap.Modal.getInstance(document.getElementById('modalEditarPago')).hide();
                    cargarHistorial(); 
                } else {
                    alert('❌ Error al actualizar el pago.');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });

        // 9. ELIMINAR / ANULAR PAGO
        async function eliminarPago(id) {
            const confirmacion = confirm('⚠️ ATENCIÓN: ¿Estás seguro de que querés ANULAR este pago? Esta acción restará el dinero de la recaudación total.');
            if (!confirmacion) return;
            try {
                const respuesta = await fetch(`/pagos/${id}`, {
                    method: 'DELETE'
                });
                if (respuesta.ok) {
                    alert('🗑️ Pago anulado correctamente.');
                    cargarHistorial(); 
                } else {
                    alert('❌ Hubo un error al intentar anular el pago.');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // ====================================================================
        // GESTIÓN DE DEUDAS Y NOTIFICACIONES MASIVAS (DÍA 10)
        // ====================================================================
        async function verDeudores() {
            const mesFiltro = document.getElementById('filtro-mes').value;
            
            if (mesFiltro === "") {
                alert("⚠️ Por favor, selecciona un MES específico para ver quiénes adeudan esa cuota.");
                return;
            }

            const tabla = document.getElementById('tabla-historial');
            
            const btnPrevio = document.getElementById('contenedor-boton-notificar');
            if (btnPrevio) btnPrevio.remove();

            tabla.innerHTML = '<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-danger"></div> Buscando deudores...</td></tr>';

            try {
                const resJug = await fetch('/jugadores');
                const todosLosJugadores = await resJug.json();

                const resPagos = await fetch('/pagos-todos');
                const todosLosPagos = await resPagos.json();
                const pagosDelMes = todosLosPagos.filter(p => p.mes_correspondiente === mesFiltro);

                const deudores = todosLosJugadores.filter(jugador => {
                    return !pagosDelMes.some(pago => Number(pago.jugador_id) === Number(jugador.id));
                });

                document.getElementById('stat-cuotas').innerText = deudores.length;
                document.getElementById('titulo-cuotas').innerText = `Deudores de ${mesFiltro}`;
                document.getElementById('stat-recaudacion').innerText = "---";
                document.getElementById('titulo-recaudacion').innerText = "Pendiente de Cobro";

                if (deudores.length === 0) {
                    tabla.innerHTML = `<tr><td colspan="6" class="text-center text-success py-4 fw-bold">¡Excelente! Todos los jugadores están al día con ${mesFiltro}.</td></tr>`;
                    return;
                }

                tabla.innerHTML = '';
                deudores.forEach(deudor => {
                    const fila = `
                        <tr class="table-danger">
                            <td class="ps-3 fw-bold text-dark small">${deudor.apellido}, ${deudor.nombre}</td>
                            <td class="fw-bold text-danger">${mesFiltro}</td>
                            <td class="text-muted small">PENDIENTE</td>
                            <td class="fw-bold text-muted">$ --.---</td>
                            <td><span class="badge bg-danger">IMPAGO</span></td>
                            <td class="text-center">
                                <button class="btn btn-sm btn-success fw-bold" onclick="prepararCobro(${deudor.id}, '${mesFiltro}')">
                                    <i class="bi bi-cash"></i> Cobrar ahora
                                </button>
                            </td>
                        </tr>
                    `;
                    tabla.innerHTML += fila;
                });

                const btnMasivoHTML = `
                    <div id="contenedor-boton-notificar" class="p-3 bg-light border-top text-end" style="border-radius: 0 0 15px 15px;">
                        <button class="btn btn-primary fw-bold shadow-sm" onclick='enviarRecordatoriosMasivos(${JSON.stringify(deudores)}, "${mesFiltro}")'>
                            <i class="bi bi-whatsapp"></i> Notificar a los ${deudores.length} deudores (Plazo Vencido)
                        </button>
                    </div>
                `;
                tabla.closest('.card').insertAdjacentHTML('beforeend', btnMasivoHTML);

            } catch (error) {
                console.error('Error al gestionar deudas:', error);
                alert("❌ Error al conectar con el servidor para calcular deudas.");
            }
        }

        let estadoEnvioMasivo = { envios: [], idLote: "", index: 0 };

        function enviarRecordatoriosMasivos(deudores, mes) {
            const loteActual = mes + "_" + deudores.length;

            if (estadoEnvioMasivo.idLote !== loteActual) {
                let nuevaCola = [];
                
                deudores.forEach(deudor => {
                    if (deudor.telefono) {
                        nuevaCola.push({
                            deudor: deudor,
                            telefono: deudor.telefono,
                            tipo: "Jugador",
                            mensaje: `Hola ${deudor.nombre}! Te saludamos del Club Atlético Sol de Mayo 🏀. Te recordamos que el día 10 venció el plazo para abonar la cuota de ${mes}. Si ya realizaste el pago, por favor envianos el comprobante. ¡Muchas gracias por acompañar al club!`
                        });
                    }

                    if (deudor.contacto_emergencia_tel) {
                        const nombreContacto = deudor.contacto_emergencia_nombre || "Contacto";
                        nuevaCola.push({
                            deudor: deudor,
                            telefono: deudor.contacto_emergencia_tel,
                            tipo: `Contacto: ${nombreContacto}`,
                            mensaje: `Hola ${nombreContacto}! Te escribimos del Club Atlético Sol de Mayo 🏀. Nos comunicamos con vos como contacto de ${deudor.nombre} ${deudor.apellido}. Te recordamos que el día 10 venció el plazo para abonar su cuota de ${mes}. Si ya realizaron el pago, por favor envíennos el comprobante. ¡Muchas gracias!`
                        });
                    }
                });

                if (nuevaCola.length === 0) {
                    alert("⚠️ Ninguno de los deudores en esta lista tiene un teléfono o contacto de emergencia registrado.");
                    return;
                }

                if (!confirm(`Se generaron ${nuevaCola.length} avisos (entre jugadores y contactos de emergencia).\n\nLos chats se abrirán uno por uno con cada clic para evitar bloqueos del navegador.`)) return;
                
                estadoEnvioMasivo = { envios: nuevaCola, idLote: loteActual, index: 0 };
            }

            if (estadoEnvioMasivo.index >= estadoEnvioMasivo.envios.length) return;

            const envioActual = estadoEnvioMasivo.envios[estadoEnvioMasivo.index];
            
            const url = `https://api.whatsapp.com/send?phone=${envioActual.telefono}&text=${encodeURIComponent(envioActual.mensaje)}`;
            window.open(url, '_blank');

            estadoEnvioMasivo.index++;
            
            actualizarBotonEnvio();
        }

        function actualizarBotonEnvio() {
            const btn = document.querySelector('#contenedor-boton-notificar button');
            if (!btn) return;

            if (estadoEnvioMasivo.index < estadoEnvioMasivo.envios.length) {
                const proximo = estadoEnvioMasivo.envios[estadoEnvioMasivo.index];
                btn.innerHTML = `<i class="bi bi-whatsapp"></i> Enviar al siguiente (${estadoEnvioMasivo.index + 1}/${estadoEnvioMasivo.envios.length}) - ${proximo.deudor.apellido} (${proximo.tipo})`;
                btn.classList.remove('btn-primary');
                btn.classList.add('btn-warning', 'text-dark');
            } else {
                btn.innerHTML = `<i class="bi bi-check-circle-fill"></i> ¡Todos los avisos enviados!`;
                btn.classList.remove('btn-warning', 'text-dark', 'btn-primary');
                btn.classList.add('btn-success');
                btn.disabled = true; 
            }
        }

        // ====================================================================
        // NUEVA LÓGICA: PREPARAR COBRO AUTOMATIZADO
        // ====================================================================
        function prepararCobro(id, mes) {
            // 1. Subir suavemente la pantalla al formulario
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // 2. Seleccionar el jugador automáticamente en el buscador de la izquierda (Choices.js)
            if (buscadorJugadores) {
                buscadorJugadores.setChoiceByValue(String(id));
                
                // Disparamos el evento 'change' manualmente. Esto hará que la tabla de la derecha
                // deje de mostrar deudores y pase a mostrar el historial personal del jugador.
                document.getElementById('p-jugador').dispatchEvent(new Event('change'));
            }

            // 3. Seleccionar el mes adeudado automáticamente
            document.getElementById('p-mes').value = mes;

            // 4. Poner el cursor titilando en la casilla de monto (con un leve retraso para que termine el scroll)
            setTimeout(() => {
                document.getElementById('p-monto').focus();
            }, 500);
        }

        // Iniciar todo al entrar a la página
        cargarJugadoresSelect();
        cargarHistorial(); 
    </script>
