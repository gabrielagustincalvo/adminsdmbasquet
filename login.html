<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Club 🏀</title>
    <link rel="icon" type="image/png" href="assets/Club_Sol_de_Mayo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { 
            background-color: #1e3c72; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            margin: 0;
        }

        /* PATRÓN REPETIDO DEL ESCUDO EN EL FONDO */
        .fondo-marca-agua {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('assets/Club_Sol_de_Mayo.png');
            /* AQUÍ ESTÁ LA MAGIA DEL PATRÓN: */
            background-repeat: repeat; /* Hace que se repita como baldosas */
            background-size: 120px; /* Define el tamaño exacto de cada escudito (ni muy grande, ni muy chico) */
            opacity: 0.12; /* Transparencia justa para que decore pero no moleste al leer */
            z-index: 0; 
            pointer-events: none; 
        }
        
        /* TARJETA BLANCA SÓLIDA */
        .tarjeta-login {
            width: 100%;
            max-width: 400px; 
            border-radius: 15px;
            background-color: white; 
            box-shadow: 0 1rem 3rem rgba(0,0,0,0.5)!important; 
            position: relative;
            z-index: 10; 
        }
    </style>
</head>
<body>
    
    <div class="fondo-marca-agua"></div>

    <div class="card p-4 tarjeta-login" id="caja-login">
        
        <h3 class="text-center mb-4 fw-bold text-dark d-flex align-items-center justify-content-center">
            <img src="assets/Club_Sol_de_Mayo.png" alt="Logo" width="35" class="me-2"> Login
        </h3>
        
        <form id="form-login">
            <div class="mb-3">
                <label class="form-label text-muted fw-bold small">Usuario</label>
                <input type="text" id="usuario" class="form-control form-control-lg bg-light" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted fw-bold small">Contraseña</label>
                <input type="password" id="password" class="form-control form-control-lg bg-light" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg fw-bold shadow-sm">Ingresar</button>
            <div class="text-center mt-4">
                <a href="recuperar.html" class="text-danger small fw-bold text-decoration-none">
                    ¿Olvidaste tu contraseña o usuario?
                </a>
            </div>
        </form>
    </div>

    <div class="modal fade" id="modalPrimerIngreso" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-danger">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title fw-bold">⚠️ Primer Ingreso</h5>
                </div>
                <div class="modal-body p-4">
                    <p class="text-muted text-center mb-4">
                        Por motivos de seguridad, debés elegir una <strong>nueva contraseña privada</strong> antes de entrar al sistema por primera vez.
                    </p>
                    <form id="form-cambio-pass">
                        <input type="hidden" id="usuario-id-temporal"> 
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nueva Contraseña Privada</label>
                            <input type="password" id="nueva-pass-1" class="form-control form-control-lg" required minlength="6">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Repetir Contraseña</label>
                            <input type="password" id="nueva-pass-2" class="form-control form-control-lg" required minlength="6">
                            <small id="error-pass" class="text-danger d-none mt-1">Las contraseñas no coinciden.</small>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 btn-lg fw-bold shadow-sm">Guardar y Entrar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        let datosUsuarioTemporal = null; 

        // LÓGICA DE INGRESO
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });

                const data = await res.json();
                
                if (res.ok) {
                    if (data.usuario.debe_cambiar_pass) {
                        datosUsuarioTemporal = data.usuario;
                        document.getElementById('usuario-id-temporal').value = data.usuario.id;
                        
                        document.getElementById('caja-login').style.display = 'none';
                        const modal = new bootstrap.Modal(document.getElementById('modalPrimerIngreso'));
                        modal.show();
                    } else {
                        entrarAlSistema(data.usuario);
                    }
                } else {
                    alert('❌ ' + data.mensaje);
                }
            } catch (error) {
                alert('No se pudo conectar con el servidor.');
            }
        });

        // LÓGICA DE GUARDAR LA NUEVA CLAVE
        document.getElementById('form-cambio-pass').addEventListener('submit', async (e) => {
            e.preventDefault();
            const p1 = document.getElementById('nueva-pass-1').value;
            const p2 = document.getElementById('nueva-pass-2').value;
            const idUsuario = document.getElementById('usuario-id-temporal').value;

            const msjError = document.getElementById('error-pass');

            if (p1 !== p2) {
                msjError.classList.remove('d-none');
                return;
            }
            msjError.classList.add('d-none');

            try {
                const res = await fetch('/cambiar-password-obligatorio', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: idUsuario, nuevaPassword: p1 })
                });

                if (res.ok) {
                    alert('✅ Contraseña segura establecida. Bienvenido.');
                    entrarAlSistema(datosUsuarioTemporal);
                } else {
                    alert('Error al actualizar la contraseña.');
                }
            } catch (error) {
                alert('Error de conexión.');
            }
        });

        // FUNCIÓN FINAL PARA DAR ACCESO
        function entrarAlSistema(usuarioObj) {
            sessionStorage.setItem('usuarioLogueado', usuarioObj.nombre);
            sessionStorage.setItem('usuarioRol', usuarioObj.rol);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
